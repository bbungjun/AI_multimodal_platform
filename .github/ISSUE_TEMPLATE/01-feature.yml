name: Feature
description: CreativeOps Studio 기능 또는 UX 개선 작업을 제안합니다.
title: "[FEAT] "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        기능 issue는 실제 사용자가 이미지/비디오를 만들고, prompt를 다듬고, 결과를 관리하는 흐름을 더 안정적으로 만드는지부터 판단합니다.

  - type: textarea
    id: purpose
    attributes:
      label: 목적
      description: 이 기능이 필요한 이유와 해결하려는 사용자 문제를 적어 주세요.
      placeholder: 예) 생성 실패 후 사용자가 원인을 빠르게 파악하고 retry할 수 있게 한다.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 작업 범위
      description: 이번 issue에서 할 일을 작은 체크리스트로 적어 주세요.
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: 영향받는 영역
      multiple: true
      options:
        - Generate Studio
        - History / Asset Library
        - Job Detail / Pipeline
        - Ops Console
        - Backend API
        - Worker / Dispatcher
        - Provider Boundary
        - Documentation
        - 기타
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: 완료 조건
      description: 이 issue가 끝났다고 판단할 수 있는 기준을 적어 주세요.
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: verification
    attributes:
      label: 검증 계획
      description: mock mode 기준으로 실행할 명령과 기대 결과를 적어 주세요.
      value: |
        - [ ] Backend:
        - [ ] Frontend:
        - [ ] Compose / smoke:
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 참고 사항
      description: 관련 문서, screenshot, 설계 메모, 제약 조건이 있으면 적어 주세요.
    validations:
      required: false
