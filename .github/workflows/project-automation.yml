name: Project Automation

on:
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  add-to-project:
    name: Add item to GitHub Project
    runs-on: ubuntu-latest
    steps:
      - name: Check project automation config
        id: config
        env:
          PROJECT_URL: ${{ vars.CREATIVEOPS_PROJECT_URL }}
          PROJECT_TOKEN: ${{ secrets.CREATIVEOPS_PROJECT_TOKEN }}
        run: |
          if [ -z "$PROJECT_URL" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "CREATIVEOPS_PROJECT_URL is not configured; skipping project sync."
            exit 0
          fi

          if [ -z "$PROJECT_TOKEN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "CREATIVEOPS_PROJECT_TOKEN is not configured; skipping project sync."
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Add issue or PR to project
        if: steps.config.outputs.enabled == 'true'
        uses: actions/add-to-project@v2.0.0
        with:
          project-url: ${{ vars.CREATIVEOPS_PROJECT_URL }}
          github-token: ${{ secrets.CREATIVEOPS_PROJECT_TOKEN }}
